[tool.uv.workspace]
members = ["packages/*"]

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.15.20",
    "pytest-cov>=7.1.0",
    "diff-cover>=10.3.0",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if t.TYPE_CHECKING:",
    "if typing.TYPE_CHECKING:",
    "if TYPE_CHECKING:",
]
