gateways:
  local:
    connection:
      type: duckdb
      database: db.db

default_gateway: local

model_defaults:
  dialect: duckdb
  start: 2026-06-24

linter:
  enabled: true
  rules:
    - nomissingowner
    - nomissingdescription
    - nomissinggrain
    - sqlcomplexity
    - martmodelnamingconvention
    - filenameequalsmodelname
    - banselectstar
