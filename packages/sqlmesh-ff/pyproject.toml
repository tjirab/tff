[project]
name = "sqlmesh-ff"
version = "0.2.0"
description = "Configurable fitness functions plugin for SQLMesh projects (RENAME NOTICE: Use tff-sqlmesh instead)"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
    { name = "Bart Schuijt", email = "schuijt.bart@gmail.com" }
]
dependencies = [
    "tff-sqlmesh>=0.2.0"
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/sqlmesh_ff"]

[tool.uv.sources]
tff-sqlmesh = { workspace = true }
