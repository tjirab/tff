name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv sync --all-extras --frozen
      - name: Run dependency audit
        run: uv run python scripts/audit.py --min-severity HIGH
      - run: uv run ruff check .
      - run: uv run pytest --cov=packages --cov-report=xml
      - run: uv run diff-cover coverage.xml --compare-branch=origin/main --fail-under=100
      - name: Verify packages build
        run: |
          uv build --package tff-core
          uv build --package tff-sqlmesh
          uv build --package tff-dbt
